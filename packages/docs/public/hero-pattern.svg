<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Geometric pattern - subtle background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(66, 184, 131, 0.1)" stroke-width="1"/>
    </pattern>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(66, 184, 131, 0.15)" />
      <stop offset="100%" style="stop-color:rgba(53, 73, 94, 0.15)" />
    </linearGradient>
  </defs>
  
  <!-- Background grid -->
  <rect width="800" height="600" fill="url(#grid)" />
  
  <!-- Abstract shapes representing DI/connections -->
  <circle cx="100" cy="100" r="60" fill="url(#grad1)" opacity="0.5"/>
  <circle cx="700" cy="500" r="80" fill="url(#grad1)" opacity="0.5"/>
  <circle cx="400" cy="300" r="40" fill="url(#grad1)" opacity="0.3"/>
  
  <!-- Connection lines -->
  <line x1="100" y1="100" x2="400" y2="300" stroke="rgba(66, 184, 131, 0.2)" stroke-width="2"/>
  <line x1="700" y1="500" x2="400" y2="300" stroke="rgba(66, 184, 131, 0.2)" stroke-width="2"/>
  
  <!-- Small decorative circles -->
  <circle cx="200" cy="200" r="8" fill="rgba(66, 184, 131, 0.4)"/>
  <circle cx="600" cy="400" r="12" fill="rgba(66, 184, 131, 0.3)"/>
  <circle cx="300" cy="150" r="6" fill="rgba(66, 184, 131, 0.3)"/>
  <circle cx="500" cy="450" r="10" fill="rgba(66, 184, 131, 0.25)"/>
</svg>
