<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .wm   { font-family: 'Instrument Sans', 'Segoe UI', sans-serif; font-size: 62px; font-weight: 800; letter-spacing: -2px; }
    .meta { font-family: 'Geist Mono', 'Fira Code', 'Courier New', monospace; font-size: 11px; font-weight: 500; letter-spacing: 3px; fill: rgba(61,214,140,0.75); }
    .sub  { font-family: 'Instrument Sans', 'Segoe UI', sans-serif; font-size: 12.5px; font-weight: 400; fill: rgba(255,255,255,0.4); }
    .br   { fill: none; stroke: #3dd68c; stroke-width: 2; stroke-linecap: round; }
    .cir  { fill: none; stroke: rgba(61,214,140,0.6); stroke-width: 1; stroke-linecap: round; }
    .cird { fill: none; stroke: rgba(61,214,140,0.18); stroke-width: 1; stroke-linecap: round; }
  </style>
  <radialGradient id="splashL" cx="0%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#3dd68c" stop-opacity="0.13"/>
    <stop offset="100%" stop-color="#3dd68c" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="splashR" cx="100%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#3dd68c" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#3dd68c" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="splashT" cx="38%" cy="0%" r="45%">
    <stop offset="0%" stop-color="#3dd68c" stop-opacity="0.09"/>
    <stop offset="100%" stop-color="#3dd68c" stop-opacity="0"/>
  </radialGradient>
</defs>

<!-- Background -->
<rect width="900" height="260" fill="#0d0d0e"/>
<rect width="900" height="260" fill="url(#splashL)"/>
<rect width="900" height="260" fill="url(#splashR)"/>
<rect width="900" height="260" fill="url(#splashT)"/>

<!-- Corner accents -->
<path d="M 0 60 L 0 0 L 60 0" class="cird"/>
<path d="M 840 0 L 900 0 L 900 60" class="cird"/>
<path d="M 900 200 L 900 260 L 840 260" class="cird"/>
<path d="M 60 260 L 0 260 L 0 200" class="cird"/>

<!-- LEFT BRACKET { -->
<path d="M 118 68 C 110 68 105 73 105 82 L 105 120 C 105 131 97 136 89 136 C 97 136 105 141 105 152 L 105 178 C 105 187 110 191 118 191" class="br"/>
<circle cx="89" cy="136" r="3.5" fill="#3dd68c"/>
<circle cx="89" cy="124" r="2" fill="rgba(61,214,140,0.25)"/>
<circle cx="89" cy="148" r="2" fill="rgba(61,214,140,0.25)"/>

<!-- WORDMARK -->
<text x="137" y="158" class="wm">
  <tspan fill="#3dd68c">ioc</tspan><tspan fill="#f0f0ee">raft</tspan>
</text>

<!-- SUBTITLE -->
<text x="139" y="180" class="sub">A Dependency Injection container for Vue 3</text>
<text x="139" y="196" class="sub">using the Composition API.</text>

<!-- Three fading dots -->
<circle cx="139" cy="216" r="2.2" fill="rgba(61,214,140,0.6)"/>
<circle cx="149" cy="216" r="2.2" fill="rgba(61,214,140,0.3)"/>
<circle cx="159" cy="216" r="2.2" fill="rgba(61,214,140,0.13)"/>

<!-- DIVIDER -->
<line x1="490" y1="40" x2="490" y2="220" stroke="rgba(61,214,140,0.1)" stroke-width="1"/>

<!-- META LIST — bullet + line BEFORE text -->

<!-- VUE 3 -->
<line x1="510" y1="101" x2="546" y2="101" class="cir"/>
<circle cx="549" cy="101" r="3.5" fill="#3dd68c" opacity="0.9"/>
<text x="562" y="105" class="meta">VUE 3</text>

<!-- REACTIVITY -->
<line x1="510" y1="129" x2="546" y2="129" class="cir"/>
<circle cx="549" cy="129" r="3.5" fill="#3dd68c" opacity="0.65"/>
<text x="562" y="133" class="meta">REACTIVITY</text>

<!-- SERVICES -->
<line x1="510" y1="157" x2="546" y2="157" class="cir"/>
<circle cx="549" cy="157" r="3.5" fill="#3dd68c" opacity="0.42"/>
<text x="562" y="161" class="meta">SERVICES</text>

<!-- TYPESCRIPT -->
<line x1="510" y1="185" x2="546" y2="185" class="cir"/>
<circle cx="549" cy="185" r="3.5" fill="rgba(61,214,140,0.22)"/>
<text x="562" y="189" class="meta">TYPESCRIPT</text>

<!-- Vertical rail connecting line starts -->
<line x1="510" y1="101" x2="510" y2="185" stroke="rgba(61,214,140,0.5)" stroke-width="1"/>

<!-- Top-right circuit trace -->
<path d="M 748 22 L 780 22 L 780 80" class="cird"/>
<circle cx="780" cy="80" r="2" fill="rgba(61,214,140,0.3)"/>

<!-- Bottom-right circuit trace -->
<path d="M 748 238 L 780 238 L 780 206" class="cird"/>
<circle cx="780" cy="206" r="2" fill="rgba(61,214,140,0.3)"/>
</svg>
